<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>宝宝取名工具（懒加载+随机化版）</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 还原最初的容器布局 -->
  <div class="wrapper">
    <div class="header">
      <h2>宝宝高分取名定制工具</h2>
      <p>结合生辰/生肖/五行，智能生成专属高分名字</p>
    </div>

    <!-- 输入表单（还原最初布局） -->
    <div class="form-box">
      <div class="form-item">
        <label>宝宝姓氏：</label>
        <input type="text" id="surname" placeholder="请输入单字姓（如：李、张）" class="input-text">
      </div>
      <div class="form-item">
        <label>出生日期：</label>
        <input type="date" id="birth-date" class="input-text">
      </div>
      <div class="form-item">
        <label>宝宝性别：</label>
        <select id="gender" class="input-select">
          <option value="">请选择</option>
          <option value="girl">女宝</option>
          <option value="boy">男宝</option>
        </select>
      </div>
      <div class="form-item">
        <label>生成数量：</label>
        <select id="count" class="input-select">
          <option value="10">10个</option>
          <option value="30">30个</option>
          <option value="50">50个</option>
        </select>
      </div>

      <!-- 高级设置（还原最初样式） -->
      <div class="advanced-box">
        <button id="advanced-btn" class="btn advanced-btn">⚙️ 高级设置</button>
        <div class="advanced-content" id="advanced-panel">
          <div class="form-item">
            <label>生肖匹配权重：</label>
            <div class="range-box">
              <input type="range" id="zodiac-weight" min="0" max="100" value="70" class="range-input">
              <span id="zodiac-weight-val" class="range-val">70%</span>
            </div>
          </div>
          <div class="form-item">
            <label>季节匹配权重：</label>
            <div class="range-box">
              <input type="range" id="season-weight" min="0" max="100" value="50" class="range-input">
              <span id="season-weight-val" class="range-val">50%</span>
            </div>
          </div>
          <div class="form-item">
            <label>五行匹配权重：</label>
            <div class="range-box">
              <input type="range" id="element-weight" min="0" max="100" value="80" class="range-input">
              <span id="element-weight-val" class="range-val">80%</span>
            </div>
          </div>
          <button id="reset-weight" class="btn reset-btn">重置为默认权重</button>
        </div>
      </div>

      <!-- 生成按钮（还原最初样式） -->
      <button id="generate-btn" class="btn generate-btn">生成高分名字推荐</button>
    </div>

    <!-- 加载动画（保留懒加载+还原样式） -->
    <div class="loading-box" id="loading">
      <div class="loading-spinner"></div>
      <p id="loading-text" class="loading-tip">正在为您生成个性化好名字...</p>
    </div>

    <!-- 筛选区域（还原最初样式） -->
    <div class="filter-box" id="filter-area">
      <button class="filter-btn" data-score="95">95分以上</button>
      <button class="filter-btn" data-score="92">92-94分</button>
      <button class="filter-btn" data-score="90">90-91分</button>
      <button class="filter-btn" data-score="all">全部</button>
    </div>

    <!-- 结果区域（还原卡片样式+保留懒加载） -->
    <div class="result-box" id="result-area">
      <div class="name-grid" id="name-list"></div>
    </div>

    <!-- 收藏区域（还原样式） -->
    <div class="collection-box" id="collection-area">
      <h3 class="collection-title">我的收藏 <span id="collection-count">(0)</span></h3>
      <div class="collection-grid" id="collection-list"></div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
